const boatContainer = document.getElementById('boat-container');
const boatCount = document.getElementById('boat-count');
const emptyState = document.getElementById('empty-state');
const searchInput = document.getElementById('search');
const sortSelect = document.getElementById('sort');
const hoursSelect = document.getElementById('hours');
const sizeRangeSelect = document.getElementById('size-range');

function renderBoats(boatsToRender) {
    boatContainer.innerHTML = '';
    if (boatsToRender.length === 0) {
        emptyState.style.display = 'block';
        boatCount.textContent = '';
        return;
    }
    emptyState.style.display = 'none';
    boatCount.textContent = boatsToRender.length + ' boats shown';

    boatsToRender.forEach(function(boat) {
        const card = document.createElement('div');
        card.className = 'boat-card';
        card.innerHTML = `
            <h2>${boat.name}</h2>
            <div class="tags">
                <span>${boat.size} FT</span>
                <span>${boat.guests} Guests Max</span>
                <span>Starts at $${boat.minPrice}</span>
            </div>
            <p>${boat.pricingText}</p>
            <p>📍 ${boat.location}</p>
            <a href="${boat.photoLink}" target="_blank" rel="noopener noreferrer" class="button">View Photos</a>
        `;
        boatContainer.appendChild(card);
    });
}

function updateBoats() {
    let filteredBoats = boats.slice();
    const searchTerm = searchInput.value.toLowerCase().trim();

    if (searchTerm) {
        filteredBoats = filteredBoats.filter(function(boat) {
            return boat.name.toLowerCase().includes(searchTerm) ||
                   boat.location.toLowerCase().includes(searchTerm) ||
                   String(boat.size).includes(searchTerm);
        });
    }

    const selectedHours = hoursSelect.value;
    if (selectedHours !== 'all') {
        const hoursNum = parseInt(selectedHours, 10);
        filteredBoats = filteredBoats.filter(function(boat) {
            return boat.hours.includes(hoursNum);
        });
    }

    const selectedSize = sizeRangeSelect.value;
    if (selectedSize !== 'all') {
        filteredBoats = filteredBoats.filter(function(boat) {
            if (selectedSize === '30-40') return boat.size >= 30 && boat.size <= 40;
            if (selectedSize === '41-50') return boat.size >= 41 && boat.size <= 50;
            if (selectedSize === '50+') return boat.size >= 50;
            return true;
        });
    }

    const sortValue = sortSelect.value;
    filteredBoats.sort(function(a, b) {
        if (sortValue === 'size-asc') return a.size - b.size || a.name.localeCompare(b.name);
        if (sortValue === 'size-desc') return b.size - a.size || a.name.localeCompare(b.name);
        if (sortValue === 'price-asc') return a.minPrice - b.minPrice || a.name.localeCompare(b.name);
        if (sortValue === 'price-desc') return b.minPrice - a.minPrice || a.name.localeCompare(b.name);
        if (sortValue === 'name-asc') return a.name.localeCompare(b.name);
        return 0;
    });

    renderBoats(filteredBoats);
}

searchInput.addEventListener('input', updateBoats);
sortSelect.addEventListener('change', updateBoats);
hoursSelect.addEventListener('change', updateBoats);
sizeRangeSelect.addEventListener('change', updateBoats);

updateBoats();
</script>
